<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WebScrape Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.3) 0%, rgba(124, 58, 237, 0.3) 100%);
            border-radius: 50%;
            filter: blur(85px);
            z-index: -1;
        }
        .blob-1 { top: -80px; left: -80px; }
        .blob-2 { bottom: -80px; right: -80px; }

        .card-glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25) !important;
            border-color: #4f46e5 !important;
        }
        .btn-grad {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white !important;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-weight: 500;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
        }
        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(79, 70, 229, 0.4);
        }
        .text-gradient {
            background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card card-glass p-4 p-md-5 m-3">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><span class="text-gradient">Create Account</span></h2>
            <p class="text-secondary" style="color: #94a3b8 !important;">Join the WebScrape Pro platform</p>
        </div>
        
        <!-- Flash Alert Tray inside register card -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} py-2 px-3 mb-3 border-0 rounded-3 text-dark-emphasis" style="background: rgba(239, 68, 68, 0.15); border-left: 3px solid #ef4444; color: #fecaca !important;" role="alert">
                        <small><i class="fa-solid fa-triangle-exclamation me-2"></i> {{ message }}</small>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label text-light-emphasis small fw-medium">Username</label>
                <div class="input-group">
                    <span class="input-group-text border-secondary border-opacity-25 bg-transparent text-secondary" style="border-radius: 10px 0 0 10px; border-right: none !important;"><i class="fa-regular fa-user"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" style="border-radius: 0 10px 10px 0;" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label text-light-emphasis small fw-medium">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text border-secondary border-opacity-25 bg-transparent text-secondary" style="border-radius: 10px 0 0 10px; border-right: none !important;"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" style="border-radius: 0 10px 10px 0;" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label text-light-emphasis small fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text border-secondary border-opacity-25 bg-transparent text-secondary" style="border-radius: 10px 0 0 10px; border-right: none !important;"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create secure password" style="border-radius: 0 10px 10px 0;" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-grad w-100 mb-3">Register</button>
        </form>
        
        <div class="text-center mt-3">
            <p class="small text-secondary mb-0" style="color: #94a3b8 !important;">
                Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none text-gradient fw-medium">Log in here</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
